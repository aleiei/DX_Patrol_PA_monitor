; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = nanoatmega328new

[env:nanoatmega328new]
platform = atmelavr
board = nanoatmega328new
framework = arduino

; required libraries
lib_deps = 
    LiquidCrystal_I2C

; Base monitor build (main.cpp)
build_src_filter =
    +<*>
    -<main_3wire.cpp>
    -<main_4wire.cpp>

[env:nanoatmega328new_3wire]
platform = atmelavr
board = nanoatmega328new
framework = arduino

lib_deps =
    LiquidCrystal_I2C

; 3-wire fan build (main_3wire.cpp)
build_src_filter =
    +<*>
    -<main.cpp>
    -<main_4wire.cpp>

[env:nanoatmega328new_4wire]
platform = atmelavr
board = nanoatmega328new
framework = arduino

lib_deps =
    LiquidCrystal_I2C

; 4-wire fan build (main_4wire.cpp)
build_src_filter =
    +<*>
    -<main.cpp>
    -<main_3wire.cpp>
